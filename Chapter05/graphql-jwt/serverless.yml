service: cncb-graphql-jwt

provider:
  name: aws
  runtime: nodejs22.x
  # cfnRole: arn:aws:iam::<account-number>:role/${opt:stage}-cfnRole

functions:
  graphql:
    handler: handler.graphql
    events:
      - http:
          path: graphql
          method: post
          cors: true
          authorizer:
            arn: ${cf:cncb-cognito-pool-${opt:stage}.userPoolArn}
